name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: compiler
    steps:
      - uses: actions/checkout@v4

      - name: Install wasmtime
        working-directory: .
        run: |
          curl https://wasmtime.dev/install.sh -sSf | bash
          echo "$HOME/.wasmtime/bin" >> $GITHUB_PATH

      - name: Download bootstrap puppyc.wasm
        run: |
          curl -sL https://github.com/matthewp/puppy-scheme/releases/latest/download/puppyc.wasm -o puppyc.wasm

      - name: Build puppyc.wasm (self-hosted)
        run: |
          wasmtime run --wasm gc --dir=/ puppyc.wasm -- -o $(pwd)/puppyc.wasm.tmp $(pwd)/src/compiler/main.scm
          mv puppyc.wasm.tmp puppyc.wasm

      - name: Run tests
        run: make test
